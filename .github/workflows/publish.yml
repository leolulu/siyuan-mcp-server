name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: pypi-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write  # 必需：用于 Trusted Publishing

jobs:
  build:
    name: Build distribution 📦
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Verify tag matches pyproject version
        run: |
          python - <<'PY'
          from __future__ import annotations

          import os
          import re
          import sys
          from pathlib import Path

          tag = os.environ.get("GITHUB_REF_NAME", "")
          if not tag.startswith("v"):
              raise SystemExit(f"Unexpected tag: {tag}")

          tag_version = tag[1:]
          pyproject = Path("pyproject.toml").read_text(encoding="utf-8")
          match = re.search(r"(?m)^version\s*=\s*\"([^\"]+)\"\s*$", pyproject)
          if not match:
              raise SystemExit("Could not find version in pyproject.toml")

          file_version = match.group(1)
          if file_version != tag_version:
              raise SystemExit(
                  f"Tag version {tag_version} does not match pyproject version {file_version}"
              )
          print(f"Version OK: {file_version}")
          PY

      - name: Build
        run: uv build

      - name: Store the distribution packages
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/

  publish-to-testpypi:
    name: Upload release to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/siyuan-mcp-server
    permissions:
      id-token: write  # 必需：用于 Trusted Publishing
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution 📦 to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-to-pypi:
    name: Upload release to PyPI
    needs: [build, publish-to-testpypi]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/siyuan-mcp-server
    permissions:
      id-token: write  # 必需：用于 Trusted Publishing
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution 📦 to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
